name: TestPyPI Release

on:
  workflow_dispatch: {}

jobs:
  # ── Pure-Python package (decayangle) ────────────────────────────────────────
  build-python:
    name: Build pure-Python distribution (decayangle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Hatch
        run: pipx install hatch
      - name: Build distribution
        run: hatch build
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ── Rust extension wheels (decayangle-rs) ───────────────────────────────────
  build-rust:
    name: Build Rust wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          # - os: macos-13
          #   target: x86_64-apple-darwin
          #   manylinux: ""
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: decayangle-rs
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release
            --out ../dist-rs
            --interpreter 3.8 3.9 3.10 3.11 3.12
      - uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist-rs/

  # ── Source distribution for decayangle-rs ───────────────────────────────────
  build-rust-sdist:
    name: Build Rust source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: decayangle-rs
          command: sdist
          args: --out ../dist-rs
      - uses: actions/upload-artifact@v4
        with:
          name: rust-sdist
          path: dist-rs/

  # ── Publish decayangle to TestPyPI ──────────────────────────────────────────
  publish-python:
    name: Publish decayangle to TestPyPI
    needs: [build-python]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/decayangle
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Publish decayangle-rs to TestPyPI ───────────────────────────────────────
  publish-rust:
    name: Publish decayangle-rs to TestPyPI
    needs: [build-rust, build-rust-sdist]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/decayangle-rs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rust-wheels-*
          merge-multiple: true
          path: dist-rs/
      - uses: actions/download-artifact@v4
        with:
          name: rust-sdist
          path: dist-rs/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-rs/
          repository-url: https://test.pypi.org/legacy/
