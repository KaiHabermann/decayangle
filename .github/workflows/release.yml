name: PyPi Release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  # ── Pure-Python package (decayangle) ────────────────────────────────────────
  build-python:
    name: Build pure-Python distribution (decayangle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Hatch
        run: pipx install hatch
      - name: Build distribution
        run: hatch build
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ── Rust extension wheels (decayangle-rs) ───────────────────────────────────
  build-rust:
    name: Build Rust wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — build inside manylinux container for broad compatibility
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          # Linux aarch64 (cross-compile)
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          # macOS Apple Silicon (macos-14/latest is ARM64)
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: ""
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: decayangle-rs
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release
            --out ../dist-rs
            --interpreter 3.9 3.10 3.11 3.12
      - uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist-rs/

  # ── Source distribution for decayangle-rs (allows pip to build from source) ─
  build-rust-sdist:
    name: Build Rust source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: decayangle-rs
          command: sdist
          args: --out ../dist-rs
      - uses: actions/upload-artifact@v4
        with:
          name: rust-sdist
          path: dist-rs/

  # ── Publish decayangle to PyPI ───────────────────────────────────────────────
  publish-python:
    name: Publish decayangle to PyPI
    needs: [build-python, publish-rust]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/decayangle
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── Publish decayangle-rs to PyPI ───────────────────────────────────────────
  publish-rust:
    name: Publish decayangle-rs to PyPI
    needs: [build-rust, build-rust-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/decayangle-rs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rust-wheels-*
          merge-multiple: true
          path: dist-rs/
      - uses: actions/download-artifact@v4
        with:
          name: rust-sdist
          path: dist-rs/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-rs/

  # ── GitHub Release with signatures ──────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [publish-python, publish-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          pattern: rust-wheels-*
          merge-multiple: true
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: rust-sdist
          path: dist/
      - name: Sign distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          --notes ""
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload
          '${{ github.ref_name }}' dist/**
          --repo '${{ github.repository }}'
